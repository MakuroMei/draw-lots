function normalizeProbabilityWeights(list,ws,total=1000){

  for(let i=0;i<n;i++)if(i!==index)otherIndexes.push(i);
  const otherRaw=otherIndexes.map(i=>Math.max(1,normalized[i]||1));

  result[index]=target;

  otherIndexes.forEach((idx,j)=>{
    const v=Math.max(1,Math.floor(exact[j]));

    assigned+=v;
  });
  let diff=remaining-assigned;
  if(diff>0){
    const order=exact.map((v,j)=>({j,frac:v-Math.floor(v)})).sort((a,b)=>b.frac-a.frac);

function shadeHexColor(hex,ratio){
  const m=String(hex||'').trim().match(/^#?([0-9a-f]{6})$/i);
  if(!m)return 'rgba(0,0,0,.45)';
  const n=parseInt(m[1],16);
  const r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  const mix=(v)=>Math.round(v*(1-ratio));
  return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
}

function easeOutCubic(t){return 1-Math.pow(1-t,3)}
function updateAppearanceTextMask(sliderTop){
  const buttons=[...document.querySelectorAll('.appearance-btn')];
  buttons.forEach((btn,i)=>{
    const light=btn.querySelector('.appearance-btn-text-light');
    if(!light)return;
    const row=96;
    const btnTop=i*row;
    const btnBottom=btnTop+row;
    const sliderBottom=sliderTop+row;
    const visibleTop=Math.max(btnTop,sliderTop);
    const visibleBottom=Math.min(btnBottom,sliderBottom);
    if(visibleBottom<=visibleTop){
      light.style.clipPath='inset(100% 0 0 0)';
      return;
    }
    const topClip=visibleTop-btnTop;
    const bottomClip=btnBottom-visibleBottom;
    light.style.clipPath=`inset(${topClip}px 0 ${bottomClip}px 0)`;
  });
}

function rollUpdateVisuals(forceFocus=false){if(rollMode.infiniteActive){rollUpdateInfiniteVisuals(forceFocus);return}if(!data.items.length){rollUpdateEmptyVisuals(forceFocus);return}const activeIndex=Math.max(0,Math.min(data.items.length-1,rollCenterIndex())),focusColor=(defaultColorTransitionFrom&&!rollHasCustomColor(activeIndex))?rollCenterColor(defaultColorTransitionFrom):rollCenterColor();rollMode.rows.forEach(parts=>{const layout=rollLayoutFor(parts.index),distance=parts.index-activeIndex,isCenter=parts.index===activeIndex,visualLayout=rollResultLayoutFromDistance(distance),displayLayout=(spin.mode==='result'&&rollMode.resultSpreadActive&&!isCenter)?visualLayout:layout,visible=layout.abs<=rollCfg.maxRenderDistance,resultVisible=displayLayout.abs<=rollCfg.maxRenderDistance;parts.row.classList.toggle('center',isCenter);parts.row.style.opacity=(visible||resultVisible)?String(displayLayout.opacity):'0';parts.row.style.transform='translateY(calc(-50% + '+displayLayout.y+'px))';parts.row.style.visibility=(visible||resultVisible)?'visible':'hidden';parts.inner.style.setProperty('--item-x',displayLayout.x+'px');parts.track.style.width=displayLayout.trackWidth+'px';parts.focus.style.backgroundColor=focusColor+'cc';parts.right.style.left=displayLayout.rightX+'px';parts.label.style.width=displayLayout.textWidth+'px';parts.label.style.fontSize=(18+displayLayout.scale*18)+'px';parts.label.style.fontWeight=String(520+displayLayout.scale*260)});rollSetFocusColor(focusColor,forceFocus);rollUpdateFocusProbability();updatePreview()}

function rollFinishResult(){
  rollMode.weightedTargetIndex=null;
  rollMode.weightedTargetScroll=null;
  rollMode.weightedSnapOffset=null;
  if(!data.items.length)return;
  const index=rollMod(Math.round(rollMode.scroll),data.items.length);
  spin.selectedIndex=index;
  spin.selectedItem=data.items[index]||null;
  rollMode.scroll=Math.round(rollMode.scroll);
  rollMode.velocity=0;
  rollSetSettled(false);
  setMode('result');
  rollUpdateVisuals(true);
  requestAnimationFrame(()=>requestAnimationFrame(()=>rollSetSettled(true)));
}
function rollEaseOutCubic(t){return 1-Math.pow(1-t,3)}
function rollEaseOutQuint(t){return 1-Math.pow(1-t,5)}
function rollSlowStop(startVelocity,opts={}){
  rollStopFrame();
  rollMode.dragging=false;
  const cancelToIdle=!!opts.cancelToIdle;
  rollMode.cancelSlowingToIdle=cancelToIdle;
  const rawVelocity=(Number.isFinite(startVelocity)?startVelocity:rollMode.velocity)||0;
  const dir=rawVelocity<0?-1:1;
  const speed=Math.max(.04,Math.min(1.25,Math.abs(rawVelocity)));
  const startScroll=rollMode.scroll;
  const brakeMix=Math.min(1,speed/1.25);
  let travel=dir*(cancelToIdle?Math.min(11,Math.max(1.6,speed*9+1.2)):Math.min(22,Math.max(4,speed*20+3)));
  let naturalTarget=startScroll+travel;
  let target;
  if(cancelToIdle){
    target=Math.round(naturalTarget);
  }else if(Number.isFinite(rollMode.weightedTargetScroll)){
    target=rollMode.weightedTargetScroll;
    // Slow down to just before the weighted target, then use the built-in snap
    // phase to settle into focus.  This keeps the normal absorption feel without
    // the old late multi-row forced jump.
    const snapOffset=Number.isFinite(rollMode.weightedSnapOffset)?rollMode.weightedSnapOffset:((Math.random()*2-1)*0.42);
    travel=target-startScroll+snapOffset;
    naturalTarget=startScroll+travel;
  }else{
    const weightedIndex=rollWeightedRandomIndex();
    target=rollLogicalTargetForIndex(weightedIndex,naturalTarget);
    rollMode.weightedTargetIndex=weightedIndex;
    rollMode.weightedTargetScroll=target;
    const snapOffset=Number.isFinite(rollMode.weightedSnapOffset)?rollMode.weightedSnapOffset:((Math.random()*2-1)*0.42);
    travel=target-startScroll+snapOffset;
    naturalTarget=startScroll+travel;
  }
  const coastDuration=cancelToIdle?Math.round(860-brakeMix*340):1180;
  const snapDuration=cancelToIdle?Math.round(360-brakeMix*110):330;
  const started=performance.now();
  const snapStart=started+coastDuration;
  let snapFrom=null;
  setMode('slowing');
  rollSetSettled(false);
  const step=now=>{
    if(spin.mode!=='slowing')return;
    if(now<snapStart){
      const t=Math.min(1,(now-started)/coastDuration);
      const eased=cancelToIdle?rollEaseOutQuint(t):rollEaseOutCubic(t);
      rollMode.scroll=startScroll+travel*eased;
      rollMode.velocity=dir*speed*Math.pow(1-t,cancelToIdle?3.6:2.4);

      rollUpdateVisuals();
      rollMode.frame=requestAnimationFrame(step);
      return;
    }
    if(snapFrom===null)snapFrom=rollMode.scroll;
    const t=Math.min(1,(now-snapStart)/snapDuration);
    rollMode.scroll=snapFrom+(target-snapFrom)*rollEaseOutQuint(t);
    rollMode.velocity=0;
    rollClamp();
    rollUpdateVisuals();
    if(t<1){
      rollMode.frame=requestAnimationFrame(step);
      return;
    }
    rollMode.frame=null;
    rollMode.scroll=target;
    rollMode.velocity=0;
    rollUpdateVisuals(true);
    if(cancelToIdle||rollMode.cancelSlowingToIdle){
      rollMode.cancelSlowingToIdle=false;
      rollMode.weightedTargetIndex=null;
      rollMode.weightedTargetScroll=null;
  rollMode.weightedSnapOffset=null;
      spin.selectedIndex=-1;
      spin.selectedItem=null;
      // Return to idle after the brake, but replay the settled focus effect
      // after the finite list has been rebuilt by the state change.
      setMode('idle');
      rollSetSettled(false);
      rollUpdateVisuals(true);
      requestAnimationFrame(()=>requestAnimationFrame(()=>rollSetSettled(true)));
    }else{
      rollMode.cancelSlowingToIdle=false;
      rollFinishResult();
    }
  };
  rollMode.frame=requestAnimationFrame(step);
}

function rollCancelSlowingToIdle(){
  if(appearanceMode!=='roll')return;
  // Do not add a new brake segment or stop the current animation.  Mark the
  // active slowing sequence so it finishes its existing coast/snap normally,
  // then commits back to idle instead of result.
  rollMode.cancelSlowingToIdle=true;
  rollMode.weightedTargetIndex=null;
  rollMode.weightedTargetScroll=null;
  rollMode.weightedSnapOffset=null;
  rollMode.dragging=false;
  spin.selectedIndex=-1;
  spin.selectedItem=null;
}

function rollAutoSpin(releaseVelocity){
  if(!data.items.length)return;
  rollStopFrame();
  rollMode.dragging=false;

  const n=data.items.length;
  const releaseDir=releaseVelocity<0?-1:1;
  const weightedIndex=rollWeightedRandomIndex();

  // Decide the result before spinning starts.  Then solve the 1s spinning speed
  // and the later slowing travel together, so the slowing coast naturally ends
  // at the weighted target instead of needing a late forced snap.
  const current=rollMode.scroll;
  const baseSpeed=Math.max(.18,Math.min(1.2,Math.abs(releaseVelocity||0)+.22));
  const cycles=3+Math.ceil(baseSpeed*2);
  let target=rollLogicalTargetForIndex(weightedIndex,current+releaseDir*n*cycles);

  // Keep the target comfortably ahead in the release direction.
  const minAhead=n*2.2;
  if(releaseDir>0){
    while(target-current<minAhead)target+=n;
  }else{
    while(current-target<minAhead)target-=n;
  }

  const totalNeeded=target-current;
  const dir=totalNeeded<0?-1:1;
  const absNeeded=Math.abs(totalNeeded);

  // rollSlowStop's normal travel is min(22, max(4, speed*20+3)).
  // During spinning, 1000ms at speed means roughly speed * (1000 / 16.67).
  // Pick a speed that makes: spinTravel + slowTravel ~= target.
  let speedAbs=(absNeeded-3)/(1000/16.67+20);
  speedAbs=Math.max(.18,Math.min(1.2,speedAbs));

  // Re-pick target near the exact natural destination created by this speed,
  // so the final snap is only sub-row alignment instead of an extra jump.
  const naturalTravel=speedAbs*(1000/16.67)+Math.min(22,Math.max(4,speedAbs*20+3));
  target=rollLogicalTargetForIndex(weightedIndex,current+dir*naturalTravel);

  // If normalization moved the target behind us, shift it by whole cycles.
  if(dir>0){
    while(target-current<Math.max(4,n*1.2))target+=n;
  }else{
    while(current-target<Math.max(4,n*1.2))target-=n;
  }

  speedAbs=(Math.abs(target-current)-3)/(1000/16.67+20);
  speedAbs=Math.max(.18,Math.min(1.2,speedAbs));
  const speed=dir*speedAbs;

  rollMode.weightedTargetIndex=weightedIndex;
  rollMode.weightedTargetScroll=target;
  // Randomly approach the target from either side within the focus snap zone.
  // The final snap still settles on the exact weighted item.
  rollMode.weightedSnapOffset=(Math.random()*2-1)*0.42;
  if(Math.abs(rollMode.weightedSnapOffset)<0.14){
    rollMode.weightedSnapOffset+=(rollMode.weightedSnapOffset<0?-1:1)*0.14;
  }

  setMode('spinning');
  rollMode.velocity=speed;
  const start=performance.now();
  let prev=start;
  const step=now=>{
    const dt=Math.min(32,now-prev);prev=now;
    rollMode.velocity=speed;
    rollMode.scroll+=speed*(dt/16.67);
    rollClamp();
    rollUpdateVisuals();
    if(spin.mode!=='spinning')return;
    if(now-start<1000)rollMode.frame=requestAnimationFrame(step);
    else rollSlowStop(speed);
  };
  rollMode.frame=requestAnimationFrame(step);
}
function rollAnimate(){if(!rollMode.dragging){rollMode.scroll+=rollMode.velocity;rollMode.velocity*=.965}if(!rollMode.dragging&&Math.abs(rollMode.velocity)<.004){const target=Math.round(rollMode.scroll),diff=target-rollMode.scroll;rollMode.velocity=0;rollMode.scroll+=diff*.18;if(Math.abs(diff)<.01)rollMode.scroll=target}rollClamp();rollUpdateVisuals();const snap=Math.abs(Math.round(rollMode.scroll)-rollMode.scroll);if(rollMode.dragging||Math.abs(rollMode.velocity)>.0001||snap>.001){rollMode.frame=requestAnimationFrame(rollAnimate)}else{rollMode.frame=null;rollUpdateVisuals();requestAnimationFrame(()=>rollSetSettled(true))}}

function rollStartMotion(){rollClearResultSpread();rollSetSettled(false)}
function rollSyncFromData(){
  rollMode.weightedTargetIndex=null;
  rollMode.weightedTargetScroll=null;
  rollMode.weightedSnapOffset=null;
  if(data.items.length){
    if(rollIsInfinite()||rollMode.infiniteActive)rollNormalizeInfinite();
    else if(rollMode.scroll>data.items.length-1)rollMode.scroll=Math.max(0,data.items.length-1);
  }

  if(data.items.length)rollSetSettled(true);else rollSetSettled(false);

}
function setAppearanceMode(mode,opts={}){
  const nextMode=mode==='roll'?'roll':(mode==='test'?'test':'wheel');
  const apply=()=>{
    if(!opts.skipSave){
      snapshotData(appearanceMode);
      if(typeof snapshotDrawState==='function')snapshotDrawState(appearanceMode);
    }
    appearanceMode=nextMode;
    window.currentAppearanceMode=nextMode;
    const dataMode=nextMode==='roll'?'roll':(nextMode==='test'?'test':'wheel');
    loadDataMode(dataMode);
    if(typeof loadDrawState==='function')loadDrawState(dataMode);
    document.body.classList.toggle('appearance-roll',nextMode==='roll');
    document.body.classList.toggle('appearance-test',nextMode==='test');
    if(typeof applyDrawMode==='function')applyDrawMode(spin.mode);
    if(nextMode==='roll')rollSyncFromData();
    else if(nextMode==='wheel'){

    }

  setTimeout(()=>{apply();requestAnimationFrame(()=>document.body.classList.remove('mode-fading'))},180);
}


function rollIsMotionActive(){
  if(appearanceMode!=='roll'||!data.items.length)return false;
  const snap=Math.abs(Math.round(rollMode.scroll)-rollMode.scroll);
  return !!rollMode.frame||rollMode.dragging||Math.abs(rollMode.velocity)>.0001||snap>.001;
}
function rollCanChangeDrawState(){return !rollIsMotionActive()}

rollEl.window.addEventListener('pointerdown',ev=>{if(appearanceMode!=='roll'||!data.items.length||['spinning','slowing','result'].includes(spin.mode))return;ev.preventDefault();rollStartMotion();rollStopFrame();rollMode.dragging=true;rollMode.velocity=0;rollMode.lastY=ev.clientY;rollEl.window.setPointerCapture?.(ev.pointerId)});

  if(appearanceMode==='roll')rollSyncFromData();
});

  if(appearanceMode==='roll'&&prev==='result'&&mode!=='result'&&data.items.length){
